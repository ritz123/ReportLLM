<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Fund Report</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Maintenance Fund Report</h1>
      <span id="status-badge" class="badge">Loading…</span>
      <span id="source-badge" class="badge source">—</span>
    </div>
    <div class="toolbar">
      <label class="upload-btn btn secondary">
        Upload Sheet
        <input type="file" id="file-upload" accept=".xlsx,.xls,.xlsm,.xltx,.md" hidden>
      </label>
      <select id="model-select" title="Ollama model"></select>
      <button id="btn-ollama-settings" class="btn secondary" type="button" title="Ollama API settings">Ollama</button>
      <button id="btn-reload" class="btn secondary">Reload Default</button>
      <button id="btn-preview-doc" class="btn secondary" type="button" title="Preview current report as a document">Preview</button>
      <div class="export-data-group" title="Download parsed ledger data">
        <select id="data-export-format" aria-label="Data export format">
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
        <button id="btn-export-data" class="btn secondary" type="button">Export Data</button>
      </div>
      <button id="btn-export" class="btn primary">Export Report</button>
    </div>
  </header>

  <main class="layout" id="layout">
    <section class="report-panel" id="report-panel">
      <div class="panel-header">
        <h2>Report</h2>
        <div class="panel-header-actions">
          <label class="preview-label" for="md-preview-select">Open .md file</label>
          <select id="md-preview-select" title="Preview saved markdown report files">
            <option value="">— Live summary —</option>
          </select>
          <button id="btn-load-summary" class="btn small">Generate Summary</button>
        </div>
      </div>
      <div id="report-content" class="report-content">
        <p class="placeholder">Upload an expense sheet (<strong>.xlsx</strong> like X.xlsx), pick a <strong>.md report</strong> to preview, or click <strong>Generate Summary</strong>.</p>
      </div>
    </section>

    <div class="resizer" id="resizer" title="Drag to resize panels"></div>

    <section class="chat-panel" id="chat-panel">
      <div class="panel-header">
        <h2>AI Assistant</h2>
        <span class="hint">Powered by Ollama</span>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form">
        <textarea id="chat-input" rows="3" placeholder="Ask about expenses, update the report, or request a plot…&#10;e.g. &quot;Add a section about 2023 capital spending to the report&quot;"></textarea>
        <div class="chat-actions">
          <label class="checkbox-label">
            <input type="checkbox" id="auto-plot" checked> Auto-add charts &amp; report updates
          </label>
          <button type="submit" class="btn primary" id="btn-send">Send</button>
        </div>
      </form>
      <div class="suggestions">
        <span class="suggestions-label">Try:</span>
        <button type="button" class="chip" data-prompt="Summarize the fund's financial health and add key points to the report">Summary + report</button>
        <button type="button" class="chip" data-prompt="Plot income vs expense by quarter">Income vs expense</button>
        <button type="button" class="chip" data-prompt="Show a pie chart of all expense categories">Category pie</button>
        <button type="button" class="chip" data-prompt="Add an observation about electricity cost trends to the report">Update report</button>
      </div>
    </section>
  </main>

  <dialog id="doc-preview-dialog" class="doc-preview-dialog">
    <div class="doc-preview-toolbar">
      <strong id="doc-preview-title">Document Preview</strong>
      <div class="doc-preview-actions">
        <button type="button" id="btn-doc-preview-print" class="btn small secondary">Print</button>
        <button type="button" id="btn-doc-preview-close" class="btn small primary">Close</button>
      </div>
    </div>
    <div id="doc-preview-body" class="doc-preview-body"></div>
  </dialog>

  <dialog id="ollama-settings-dialog" class="settings-dialog">
    <form id="ollama-settings-form" method="dialog">
      <h3>Ollama API Settings</h3>
      <p class="settings-hint">Base URL for your local or remote Ollama server (saved in this browser).</p>
      <label for="ollama-url-input">API URL</label>
      <input id="ollama-url-input" type="url" placeholder="http://localhost:11434" required>
      <p id="ollama-settings-status" class="settings-status" aria-live="polite"></p>
      <div class="settings-actions">
        <button type="button" id="btn-ollama-test" class="btn secondary">Test connection</button>
        <button type="button" id="btn-ollama-reset" class="btn secondary">Reset default</button>
        <button type="submit" class="btn primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
